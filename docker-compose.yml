services:
  app:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "55555:55555"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=mkjs
      - DB_PASSWORD=mkjs
      - DB_NAME=mkjsdb
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=mkjs
      - POSTGRES_PASSWORD=mkjs
      - POSTGRES_DB=mkjsdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mkjs -d mkjsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
