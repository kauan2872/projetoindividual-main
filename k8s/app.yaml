apiVersion: apps/v1
kind: Deployment
metadata:
  name: mkjs-app
  namespace: mkjs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mkjs-app
  template:
    metadata:
      labels:
        app: mkjs-app
    spec:
      containers:
        - name: mkjs-app
          image: ghcr.io/kauan/mkjs-app:latest
          ports:
            - containerPort: 55555
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: mkjsdb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mkjs-db-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mkjs-db-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 55555
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mkjs-app
  namespace: mkjs
spec:
  selector:
    app: mkjs-app
  ports:
    - port: 55555
      targetPort: 55555
