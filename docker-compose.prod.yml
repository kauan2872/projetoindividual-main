services:
  app:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=mkjs
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=mkjsdb
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=mkjs
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=mkjsdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mkjs -d mkjsdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
